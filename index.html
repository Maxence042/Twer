<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur d'images</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin-right: 10px;
    }
    img {
      display: block;
      margin-top: 20px;
      max-width: 100%;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Générateur d'images</h1>

  <input type="text" id="promptInput" placeholder="Ex: pixel art dragon" size="30"/>
  <select id="sizeSelect">
    <option value="32x32">32x32</option>
    <option value="64x64">64x64</option>
    <option value="128x128">128x128</option>
    <option value="256x256" selected>256x256</option>
  </select>
  <button id="generateBtn">Générer</button>

  <img id="resultImg" alt="Image générée" />

  <script>
    const btn = document.getElementById("generateBtn");
    const promptInput = document.getElementById("promptInput");
    const sizeSelect = document.getElementById("sizeSelect");
    const resultImg = document.getElementById("resultImg");

    btn.addEventListener("click", async () => {
      const prompt = promptInput.value.trim();
      const size = sizeSelect.value;

      if (!prompt) {
        alert("Veuillez entrer un prompt !");
        return;
      }

      resultImg.src = ""; // reset image

      try {
        const response = await fetch("https://twer-production.up.railway.app/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, size })
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`Erreur serveur: ${response.status} - ${text}`);
        }

        const blob = await response.blob();
        resultImg.src = URL.createObjectURL(blob);

      } catch (err) {
        console.error(err);
        alert("Erreur lors de la génération : " + err.message);
      }
    });
  </script>
</body>
</html>
